<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>AI Food Tracker</title>
</head>
<body>
    <div class="container">
        <div class="iphone-frame content">
            <section class="statistic">

                <div class="calories-progress">
                    <svg class="progress-ring" width="180" height="180">
                        <circle
                            class="progress-ring__bg"
                            cx="90"
                            cy="90"
                            r="70"
                        ></circle>

                        <circle
                            class="progress-ring__border"
                            cx="90"
                            cy="90"
                            r="70"
                        ></circle>

                        <circle
                            class="progress-ring__value"
                            cx="90"
                            cy="90"
                            r="70"
                            data-js-progress-ring
                        ></circle>
                    </svg>

                    <div class="calories-progress__content">
                        <p class="calories-progress__percent" data-js-progress-percent>0%</p>
                        <p class="calories__value">
                            <span data-js-statistics-calories-remain>2000</span> 
                            Kcal
                        </p>
                    </div>
                </div>
                
                <div class="PFC">
                    <div class="PFC__proteins">
                        <p class="calories__value">proteins</p>
                        <p class="calories__label"><span data-js-statistics-proteins-now>0</span>/<span data-js-statistics-proteins-normal>100</span> г</p>
                    </div>
                    <div class="PFC__fats">
                        <p class="calories__value">fats</p>
                        <p class="calories__label"><span data-js-statistics-fats-now>0</span>/<span data-js-statistics-fats-normal>50</span> г</p>
                    </div>
                    <div class="PFC__carbohydrates">
                        <p class="calories__value">carbs</p>
                        <p class="calories__label"><span data-js-statistics-carbohydrates-now>0</span>/<span data-js-statistics-carbohydrates-normal>70</span> г</p>
                    </div>
                </div>

        </section>

        <section class="cards-section">
            <div class="main-info">
                <button class="delete-items__button" data-js-delete-all-button>Delete All</button>
                <div class="total__dishes">
                    <p>Eaten dishes: <span data-js-total-eaten-foods>0</span></p>
                </div>
            </div>
            <ul class="food-list" data-js-food-list></ul>     
        </section>

        <section class="navigation">
            <nav class="navigation-menu">
                <div class="navigation-menu__statistic navigation-menu__element">
                    <button class="navigation-button">
                        <img
                        class="statistic-button__image"
                        src="assets/png-icons/nav-menu__stats.svg" 
                        alt="statistic-button">
                        </img>
                    </button>
                    
                </div>

                <div class="navigation-menu__add-photo navigation-menu__element">
                    <!-- <label for="file" class="add-photo__image">
                            <input 
                            type="file" 
                            id="file" 
                            accept="image/*"
                            class="add-photo__input"
                            data-js-add-photo-input>

                        
                    </label> -->
                    <button
                    class="navigation-button"
                    data-js-add-photo-form-page-button
                    >
                        <img 
                        class="add-photo-button__image" 
                        src="assets/png-icons/nav-menu__add-photo.svg" 
                        alt="add-photo-image">
                        </img>
                    </button>
                    
                    
                </div>

                <div class="navigation-menu__user navigation-menu__element">
                    <a href="https://github.com/Mortalzy" target="_blank">
                        <img class="user-button__image" 
                        src="assets/png-icons/nav-menu__user.svg" 
                        alt="user-image">
                        </img>
                    </a>
                    
                </div>
            </nav>
        </section>

        <div class="food-analyzer-loader" data-js-loader>
            <div class="food-analyzer-loader__spinner"></div>
            <div class="food-analyzer-loader__text">Анализируем фото...</div>
        </div>

        <div class="add-photo-page" data-js-add-photo-page>
            <div class="add-photo-page__card">
                <div class="add-photo-page__preview">
                    <img
                        class="add-photo-page__uploaded-photo"
                        src=""
                        alt="Загруженное фото"
                        data-js-uploaded-photo
                    >
                    <div class="add-photo-page__placeholder" data-js-photo-placeholder>
                        <span class="add-photo-page__placeholder-icon">📷</span>
                        <p class="add-photo-page__placeholder-text">Фото ещё не выбрано</p>
                    </div>
                </div>

                <div class="add-photo-page__controls">
                    <label class="add-photo-page__upload-button">
                        <input
                            class="add-photo-page__file-input"
                            type="file"
                            accept="image/*"
                            data-js-add-photo-input
                        >
                        Выбрать фото
                    </label>

                    <div class="add-photo-page__field">
                        <p class="add-photo-page__title">Дополнительная информация</p>
                        <input
                            class="add-photo-page__input"
                            type="text"
                            placeholder="Например: без сахара, домашнее блюдо, большой размер порции"
                            data-js-add-photo-note
                        >
                    </div>

                    <button class="add-photo-page__action-button" type="button" data-js-add-photo-button>
                        Добавить фото
                    </button>
                </div>
            </div>
        </div>

        

    </div>
</div>




    <script type="module" src="script.js" defer></script>
</body>
</html>
