<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>AI Food Tracker</title>
</head>
<body>
    <div class="container">
        <div class="iphone-frame content">
            <section class="statistic">

                <div class="calories-progress">
                    <svg class="progress-ring" width="180" height="180">
                        <circle
                            class="progress-ring__bg"
                            cx="90"
                            cy="90"
                            r="70"
                        ></circle>

                        <circle
                            class="progress-ring__border"
                            cx="90"
                            cy="90"
                            r="70"
                        ></circle>

                        <circle
                            class="progress-ring__value"
                            cx="90"
                            cy="90"
                            r="70"
                            data-js-progress-ring
                        ></circle>
                    </svg>

                    <div class="calories-progress__content">
                        <p class="calories-progress__percent" data-js-progress-percent>0%</p>
                        <p class="calories__value">
                            <span data-js-statistics-calories-remain>2000</span> ккал
                        </p>
                    </div>
                </div>
                
                <div class="PFC">
                    <div class="PFC__proteins">
                        <p class="calories__value">proteins</p>
                        <p class="calories__label"><span data-js-statistics-proteins-now>0</span>/<span data-js-statistics-proteins-normal>100</span> г</p>
                    </div>
                    <div class="PFC__fats">
                        <p class="calories__value">fats</p>
                        <p class="calories__label"><span data-js-statistics-fats-now>0</span>/<span data-js-statistics-fats-normal>50</span> г</p>
                    </div>
                    <div class="PFC__carbohydrates">
                        <p class="calories__value">carbs</p>
                        <p class="calories__label"><span data-js-statistics-carbohydrates-now>0</span>/<span data-js-statistics-carbohydrates-normal>70</span> г</p>
                    </div>
                </div>

        </section>

        <section class="cards-section">
            <div class="main-info">
                <p class="main-info__title">Your food-cards</p>
                <div class="total__dishes">
                    <p>Eaten dishes: <span data-js-total-eaten-foods>0</span></p>
                </div>
            </div>
            <ul class="food-list" data-js-food-list></ul>     
        </section>

        <section class="navigation">
            <nav class="navigation-menu">
                <div class="navigation-menu__statistic navigation-menu__element">
                    <img class="statistic-button__image" 
                    src="assets/png-icons/nav-menu__stats.svg" 
                    alt="statistic-button">
                </div>

                <div class="navigation-menu__add-photo navigation-menu__element">
                    <label for="file" class="add-photo__label">
                        <input 
                        type="file" 
                        id="file" 
                        accept="image/*"
                        class="add-photo__input"
                        data-js-add-photo-input>

                        <img class="navigation-menu__add-photo-image navigation-menu__element" 
                        src="assets/png-icons/nav-menu__add-photo.svg" 
                        alt="add-photo-image">
                    </label>
                    
                </div>

                <div class="navigation-menu__user navigation-menu__element">
                    <img class="navigation-menu__user-image" 
                    src="assets/png-icons/nav-menu__user.svg" 
                    alt="user-image"></img>
                </div>
            </nav>
        </section>

        <div class="food-analyzer-loader" data-js-loader>
            <div class="food-analyzer-loader__spinner"></div>
            <div class="food-analyzer-loader__text">Анализируем фото...</div>
        </div>
    </div>
</div>

    

    <script type="module" src="script.js" defer></script>
</body>
</html>
